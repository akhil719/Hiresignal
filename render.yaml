services:
  - type: web
    name: hiring-intel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard
      - key: SCRAPE_INTERVAL_HOURS
        value: 6
